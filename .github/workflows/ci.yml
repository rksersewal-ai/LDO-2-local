name: LDO-2 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  POSTGRES_PASSWORD: ci_test_password
  POSTGRES_DB: edms_test
  POSTGRES_USER: edms_test
  DJANGO_SECRET_KEY: ci-insecure-key-do-not-use-in-prod
  DJANGO_ALLOWED_HOSTS: localhost

jobs:
  # ─── Backend Lint & Test ────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: edms_test
          POSTGRES_USER: edms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov factory_boy

      - name: Check migrations
        env:
          EDMS_DB_ENGINE: postgresql
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        env:
          EDMS_DB_ENGINE: postgresql
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          CELERY_TASK_ALWAYS_EAGER: "true"
        run: |
          pytest --cov --cov-report=term-missing --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─── Frontend Lint, Type-Check & Build ─────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck || echo "::warning::TypeScript type check had errors"

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint || echo "::warning::Linting had errors"

  # ─── Docker Build Test ─────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t ldo2-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t ldo2-frontend:${{ github.sha }} .

  # ─── Deploy to Staging (main branch only) ──────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Deploy would happen here. Add your deployment steps."
        # Example: SSH deploy, kubectl apply, or cloud provider CLI