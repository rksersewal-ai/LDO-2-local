server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers ────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://backend:8420; frame-ancestors 'self';" always;

    # ─── Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # ─── Static Asset Caching ────────────────────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── SPA Routing ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── API Proxy ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8420;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Request size limit (10MB for document uploads)
        client_max_body_size 10m;
    }
}
